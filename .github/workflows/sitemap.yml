name: Build & Update Sitemap

on:
  # check if the sitemap is up to date every sunday
  schedule:
    - cron: "0 1 * * 0"
  push:
    branches: ["main"]
    paths:
      - "src/pages/*.tsx"
      - "src/layout/main.tsx"
      - "src/layout/helpers/*.tsx"
      - ".github/workflows/sitemap.yml"
      - "!src/layout/helpers/(turnstile|uploadInfo|includesTags).tsx"
      - "!assets/sitemap.xml"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  deployments: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    continue-on-error: true
    environment:
      name: sitemap
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          ref: "main"
          fetch-depth: 0
      - name: Fix Timestamps
        uses: chetan/git-restore-mtime-action@d186aca54f8760da4dec55313195e51ed3ebb0b3
        with:
          args: --no-directories --skip-missing
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          cache: "npm"
          node-version: "24.15"
          package-manager-cache: true
      - name: Node Install Packages
        if: success()
        run: npm install
      - name: Run sitemap rebuild
        if: success()
        run: npm run sitemap
      # It would be nice if this were auto committed instead. Might want to move to that.
      - name: Create PR of Sitemap Changes
        id: cpr
        if: success()
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          add-paths: "assets/sitemap.xml"
          commit-message: "Updated Sitemap File"
          delete-branch: true
          branch: "sitemap-updates"
          sign-commits: true
          title: "Updated Sitemap Mod Dates"
          body: "Please commit to have latest mod time dates"
          assignees: socksthewolf
          labels: sitemap
      - name: Print PR Status
        if: ${{ success() && steps.cpr.outputs.pull-request-number }}
        run: |
          echo "Pull Request Number - ${{ steps.cpr.outputs.pull-request-number }}"
          echo "Pull Request URL - ${{ steps.cpr.outputs.pull-request-url }}"
          echo "Pull Request Signed - ${{ steps.cpr.outputs.pull-request-commits-verified }}"
      - name: Cleanup Previous Deploys
        uses: strumwolf/delete-deployment-environment@035f6d27c8b8951729f4d71b2d3d6a7975139476
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: sitemap
          onlyRemoveDeployments: true