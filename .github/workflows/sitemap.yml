name: Build & Update Sitemap

on:
  # check if the sitemap is up to date every sunday
  schedule:
    - cron: "0 1 * * 0"
  push:
    branches: ["main"]
    paths:
      - "src/pages/*.tsx"
      - "src/layout/main.tsx"
      - "src/layout/helpers/*.tsx"
      - ".github/workflows/sitemap.yml"
      - "!src/layout/helpers/uploadInfo.tsx"
      - "!src/layout/helpers/turnstile.tsx"
      - "!src/layout/helpers/includesTags.tsx"
      - "!assets/sitemap.xml"
  workflow_dispatch: {}

concurrency:
  group: sitemap
  cancel-in-progress: true

jobs:
  clean_sitemap_deploys:
    runs-on: ubuntu-latest
    continue-on-error: true
    name: Clean Old Github Sitemap Deploys
    permissions:
      deployments: write
    steps:
      - name: Cleanup Previous Deploys
        uses: strumwolf/delete-deployment-environment@035f6d27c8b8951729f4d71b2d3d6a7975139476
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: sitemap
          onlyRemoveDeployments: true

  update_sitemap:
    name: Build Sitemap
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      needs_clear: ${{ steps.commit.outputs.changes_detected }}
    environment:
      name: sitemap
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          ref: "main"
          fetch-depth: 0
      - name: Fix Timestamps
        uses: chetan/git-restore-mtime-action@d186aca54f8760da4dec55313195e51ed3ebb0b3
        with:
          args: --no-directories --skip-missing
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          cache: "npm"
          node-version-file: ".node-version"
          package-manager-cache: true
      - name: Node Install Packages
        run: npm install
      - name: Rebuild Sitemap
        run: npm run sitemap
      - name: Setup GPG Key
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
      - name: Commit Sitemap Changes
        id: commit
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d
        with:
          file_pattern: "assets/sitemap.xml"
          commit_message: "Updated Sitemap"
          commit_author: "${{ steps.import-gpg.outputs.name }} <${{ steps.import-gpg.outputs.email }}>"
          commit_user_name: ${{ steps.import-gpg.outputs.name }}
          commit_user_email: ${{ steps.import-gpg.outputs.email }}
          commit_options: '-S'

  clear_sitemap_cache:
    runs-on: ubuntu-latest
    name: Clear CF Cache for Sitemap
    needs: update_sitemap
    permissions: {}
    if: ${{ needs.update_sitemap.outputs.needs_clear == 'true' }}
    environment:
      name: cloudflare
    steps:
      - name: Cloudflare Cache Cleaner
        uses: Cyb3r-Jak3/action-cloudflare-cache@6ebf798ade84e7ab7da249404e0c3b9aecf54f88
        with:
          zone: ${{ secrets.CLOUDFLARE_ZONE }}
          api_token: ${{ secrets.CLOUDFLARE_TOKEN }}
          account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          URLs: |
            https://skyscheduler.work/sitemap.xml
