# Mirror everything to Tangle
name: Tangle Bangle

on:
  push: {}
  workflow_dispatch: {}

jobs:
  tanglepush:
    runs-on: ubuntu-latest
    environment:
      name: tangle
    steps:
      - name: Push to Tangle
        uses: gwennlbh/to-tangled@v0.4
        with:
          repo: socksthewolf.com/skyscheduler
          ssh-key: ${{ secrets.KEY }}