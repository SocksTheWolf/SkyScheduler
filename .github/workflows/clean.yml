# Cleans up previous GH action queues
name: Clean GH Actions

on:
  push:
    branches: ["main"]

concurrency:
  group: clean
  cancel-in-progress: false

permissions:
  actions: write

jobs:
  # Clean up github job
  clean_github:
    name: Remove Old Github Actions
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup Actions
        uses: igorjs/gh-actions-clean-workflow@5fa2e3a4fdd40e3e7098645a0b8df08624352e5e
        with:
          token: ${{ secrets.GH_CLEANER_TOKEN }}
          runs_to_keep: 1
          runs_older_than: 0
