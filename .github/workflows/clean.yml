# Cleans up previous GH action queues
name: Clean GH Actions
on:
  push:
    branches: "main"

permissions:
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Clean up github job
  run:
    name: Cleanup
    uses: socksthewolf/workflows/.github/workflows/clean_actions.yml@main