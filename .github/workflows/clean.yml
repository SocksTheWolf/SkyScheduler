# Cleans up previous GH action queues
name: Clean GH Actions

on:
  push:
    branches: ["main"]

permissions:
  id-token: write
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Clean up github job
  clean_github:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Cleanup cloudflare env
        uses: strumwolf/delete-deployment-environment@035f6d27c8b8951729f4d71b2d3d6a7975139476
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: cloudflare
          onlyRemoveDeployments: true
      - name: Cleanup Actions
        uses: socksthewolf/gh-actions-clean-workflow@main
        with:
          token: ${{ secrets.GH_CLEANER_TOKEN }}
          runs_to_keep: 1
          runs_older_than: 0
