# Mirror everything to Tangled
name: Tangled Bangled

on:
  workflow_call:
  push:
    branches: "main"
  workflow_dispatch: {}

permissions:
  contents: read
  deployments: write

concurrency:
  group: tangled
  cancel-in-progress: false

jobs:
  push:
    name: Tangled
    uses: socksthewolf/workflows/.github/workflows/tangled.yml@main
    secrets: inherit
