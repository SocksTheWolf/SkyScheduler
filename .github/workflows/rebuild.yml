name: Force Rebuild Static Pages
on:
  # run every year (this will refresh the copyright date)
  schedule:
    - cron: "5 0 1 1 *"

  workflow_dispatch: {}

concurrency:
  group: static_pages
  cancel-in-progress: true

permissions:
  deployments: write

defaults:
  run:
    shell: bash

jobs:
  clean_deployments:
    uses: socksthewolf/workflows/.github/workflows/clean_deploys.yml@main
    with:
      environment: cf-static-builds
  make_a_deploy:
    needs: clean_deployments
    name: Make A Deploy
    runs-on: ubuntu-latest
    environment: cf-static-builds
    steps:
      - name: Force CF Rebuild
        env:
          DEPLOY_HOOK: ${{ secrets.CLOUDFLARE_DEPLOY_HOOK }}
        run: |
          echo "Hitting Deploy Hook..."
          curl --no-progress-meter -X POST $DEPLOY_HOOK | jq -r ".success"