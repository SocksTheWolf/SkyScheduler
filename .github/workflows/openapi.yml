name: Build OpenAPI Spec
on:
  push:
    branches: ["main"]
    paths:
      - "src/endpoints/openapi.tsx"
      - "bin/openapi.ts"
      - ".github/workflows/openapi.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  actions: write
  deployments: write

jobs:
  build_spec:
    uses: socksthewolf/workflows/.github/workflows/build_openapi.yml@main
    secrets: inherit
    with:
      ref: ${{ github.ref }}
      needs_node: true
      clean_deploys: true
