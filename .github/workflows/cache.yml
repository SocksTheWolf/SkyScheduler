name: Clear CF Cache

on:
  push:
    branches: ["main"]
    paths:
      - "assets/**"
      - "!assets/.assetsignore"
      - "!assets/_redirects"
      - "!assets/_headers"
      - "!assets/sitemap.xml"
      - "!assets/dep/original/**"
      - "!assets/.well-known/**"
      - "src/pages/**"
      - "src/statics/**"
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  deployments: write

jobs:
  clean_deployments:
    name: Clean Previous Deploys
    uses: socksthewolf/workflows/.github/workflows/clean_deploys.yml@main
    secrets: inherit
    with:
      environment: cloudflare
  cache_clear:
    name: Clear Cache
    uses: socksthewolf/workflows/.github/workflows/cache.yml@main
    secrets: inherit


