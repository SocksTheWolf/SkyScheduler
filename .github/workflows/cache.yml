name: Clear CF Cache

on:
  # run every year (this will refresh the copyright date)
  schedule:
    - cron: "5 0 1 1 *"
  push:
    branches: ["main"]
    paths:
      - "assets/**"
      - "!assets/.assetsignore"
      - "src/utils/(appScripts|constScriptGen|appManifest).ts"
      - "src/(layout|pages)/**"
      - "src/(limits|siteinfo).ts"
      - "src/index.tsx"
  workflow_dispatch:
    inputs:
      clear_cache:
          description: "Clear Cache"
          required: true
          type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  clear_cache:
    runs-on: ubuntu-latest
    continue-on-error: false
    environment:
      name: cloudflare
    steps:
      - name: Checkout Project
        uses: actions/checkout@v7.0.0
      - name: Cloudflare Cache Cleaner
        uses: Cyb3r-Jak3/action-cloudflare-cache@6ebf798ade84e7ab7da249404e0c3b9aecf54f88
        with:
          zone: ${{ secrets.CLOUDFLARE_ZONE }}
          api_token: ${{ secrets.CLOUDFLARE_TOKEN }}
          account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
