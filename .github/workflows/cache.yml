name: Clear CF Cache
on:
  push:
    branches: ["main"]
    paths:
      - "assets/**"
      - "!assets/.assetsignore"
      - "!assets/_redirects"
      - "!assets/_headers"
      - "!assets/sitemap.xml"
      - "!assets/dep/original/**"
      - "!assets/.well-known/**"
      - "src/pages/**"
      - "src/statics/**"
  workflow_dispatch: {}

permissions:
  deployments: write

jobs:
  clean_deployments:
    uses: socksthewolf/workflows/.github/workflows/clean_deploys.yml@main
    with:
      environment: cloudflare
  cache_clear:
    uses: socksthewolf/workflows/.github/workflows/clear_cache.yml@main
    secrets: inherit


