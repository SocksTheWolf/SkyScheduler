name: Clear CF Cache

on:
  # run every year (this will refresh the copyright date)
  schedule:
    - cron: "5 0 1 1 *"
  push:
    branches: ["main"]
    paths:
      - "assets/**"
      - "!assets/.assetsignore"
      - "!assets/_redirects"
      - "!assets/.well-known/**"
      - "src/layout/**"
      - "src/pages/**"
      - "src/statics/**"
      - "src/limits.ts"
      - "src/siteinfo.ts"
      - "src/index.tsx"
      - ".github/workflows/cache.yml"
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clear_cache:
    name: Clear Cloudflare Cache
    runs-on: ubuntu-latest
    permissions:
      deployments: write
    environment:
      name: cloudflare
    steps:
      # remove Github deployments
      - name: Cleanup Previous Deploys
        continue-on-error: true
        uses: strumwolf/delete-deployment-environment@035f6d27c8b8951729f4d71b2d3d6a7975139476
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: cloudflare
          onlyRemoveDeployments: true
      - name: Cloudflare Cache Cleaner
        uses: Cyb3r-Jak3/action-cloudflare-cache@6ebf798ade84e7ab7da249404e0c3b9aecf54f88
        with:
          zone: ${{ secrets.CLOUDFLARE_ZONE }}
          api_token: ${{ secrets.CLOUDFLARE_TOKEN }}
          account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

